<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discover</title>
  <style>
    /* ── Reset + base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    html { scroll-behavior: smooth; }
    body {
      background: #f2f2f2;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
    :focus-visible { outline: 2px solid #6c6cff; outline-offset: 2px; border-radius: 4px; }

    /* ── App shell ────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }
    .app__body {
      display: flex; align-items: flex-start;
      max-width: 1380px; margin: 0 auto; width: 100%;
      padding: 0 24px; gap: 20px;
    }
    .app__feed { flex: 1; min-width: 0; }

    /* ── Navbar ───────────────────────────────────────────────────── */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding: 0 28px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; height: 52px;
    }
    .navbar__brand { font-size: 16px; font-weight: 700; color: #111; letter-spacing: -0.3px; justify-self: start; }
    .navbar__tabs { display: flex; align-items: center; gap: 0; justify-self: center; }
    .navbar__tab {
      position: relative; background: none; border: none; cursor: pointer;
      padding: 0 16px; height: 52px; font-size: 14px; font-weight: 500;
      color: rgba(0,0,0,0.45); white-space: nowrap;
      display: flex; align-items: center; gap: 4px; transition: color 0.15s ease;
    }
    .navbar__tab:hover { color: rgba(0,0,0,0.85); }
    .navbar__tab--active { color: #111; font-weight: 600; }
    .navbar__tab--active::after {
      content: ''; position: absolute; bottom: 0; left: 16px; right: 16px;
      height: 2px; background: #111; border-radius: 2px 2px 0 0;
    }
    .navbar__topics-wrap { position: relative; }
    .navbar__tab--topics { gap: 3px; }
    .navbar__chevron { width: 14px; height: 14px; transition: transform 0.2s ease; flex-shrink: 0; }
    .navbar__chevron--open { transform: rotate(180deg); }
    .navbar__dropdown {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      padding: 6px; min-width: 180px; z-index: 200;
      animation: dropdown-in 0.15s ease both;
    }
    @keyframes dropdown-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .navbar__dropdown-item {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 9px 12px; border-radius: 8px; border: none; background: none;
      font-size: 13.5px; font-weight: 500; color: #222; cursor: pointer;
      text-align: left; transition: background 0.12s ease;
    }
    .navbar__dropdown-item:hover { background: rgba(0,0,0,0.05); }
    .navbar__dropdown-item--active { background: rgba(108,108,255,0.08); color: #6c6cff; font-weight: 600; }
    .navbar__dropdown-icon { font-size: 15px; width: 20px; text-align: center; }
    .navbar__actions { display: flex; align-items: center; gap: 8px; justify-self: end; }
    .navbar__tooltip-wrap { position: relative; display: flex; }
    .navbar__tooltip {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: #111; color: #fff; font-size: 12.5px; font-weight: 500;
      padding: 6px 10px; border-radius: 8px; white-space: nowrap;
      pointer-events: none; opacity: 0; transform: translateY(-4px);
      transition: opacity 0.15s ease, transform 0.15s ease; z-index: 300;
    }
    .navbar__tooltip-wrap:hover .navbar__tooltip { opacity: 1; transform: translateY(0); }
    .navbar__icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.12); background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s ease; color: #333;
    }
    .navbar__icon-btn svg { width: 16px; height: 16px; }
    .navbar__icon-btn:hover { background: rgba(0,0,0,0.05); }
    .navbar__share-wrap { position: relative; }
    .navbar__share-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.12); background: #fff;
      font-size: 13px; font-weight: 600; color: #111;
      cursor: pointer; transition: background 0.15s ease;
    }
    .navbar__share-btn:hover { background: rgba(0,0,0,0.05); }
    .navbar__share-dropdown {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      padding: 6px; min-width: 160px; z-index: 200;
      animation: dropdown-in 0.15s ease both;
    }
    .navbar__share-item {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 9px 12px; border-radius: 8px; border: none; background: none;
      font-size: 13.5px; font-weight: 500; color: #222; cursor: pointer;
      text-align: left; transition: background 0.12s ease; white-space: nowrap;
    }
    .navbar__share-item:hover { background: rgba(0,0,0,0.05); }

    /* ── Feed ─────────────────────────────────────────────────────── */
    .feed { display: flex; flex-direction: column; gap: 12px; padding: 20px 0 80px; min-height: 100vh; }
    .feed__section { display: flex; flex-direction: column; gap: 12px; }
    .feed__small-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .feed__double-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .feed__sentinel { height: 1px; pointer-events: none; visibility: hidden; }
    .feed__end { text-align: center; font-size: 12.5px; color: rgba(0,0,0,0.3); padding: 20px 0 4px; letter-spacing: 0.2px; }
    .feed__state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 24px; gap: 16px; text-align: center; min-height: 60vh; }
    .feed__inline-err { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; font-size: 13px; color: rgba(0,0,0,0.45); }
    .feed__btn { padding: 8px 20px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.14); background: #fff; color: rgba(0,0,0,0.75); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .feed__btn:hover { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.24); }
    .feed__btn--sm { padding: 5px 14px; font-size: 12px; }
    @media (max-width: 768px) {
      .feed__small-grid { grid-template-columns: repeat(2, 1fr); }
      .feed__double-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .feed { padding: 12px 0 60px; gap: 10px; }
      .feed__small-grid { grid-template-columns: 1fr; }
    }

    /* ── NewsCard shared ──────────────────────────────────────────── */
    .card {
      background: #fff; border: 1px solid rgba(0,0,0,0.07); border-radius: 12px;
      cursor: pointer; transition: box-shadow 0.18s ease, border-color 0.18s ease;
      display: flex; flex-direction: column;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.09); border-color: rgba(0,0,0,0.13); }
    .card__link { display: contents; text-decoration: none; color: inherit; }
    .card__img-wrap { position: relative; overflow: hidden; }
    .card__img-wrap--16-8 { aspect-ratio: 16 / 8; width: 100%; }
    .card__img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
    .card:hover .card__img { transform: scale(1.04); }
    .card__thumb-wrap { flex-shrink: 0; width: 76px; height: 76px; border-radius: 8px; overflow: hidden; }
    .card__thumb { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s ease; }
    .card:hover .card__thumb { transform: scale(1.06); }
    .card__badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--cat); }
    .card__badge--overlay {
      position: absolute; top: 10px; left: 10px;
      padding: 3px 9px; border-radius: 20px; background: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    }
    .card__badge--inline { display: inline; }
    .card__body { display: flex; flex-direction: column; gap: 5px; padding: 16px 18px; flex: 1; min-width: 0; }
    .card__source-label { font-size: 10.5px; font-weight: 600; color: rgba(0,0,0,0.38); text-transform: uppercase; letter-spacing: 0.4px; }
    .card__title { margin: 0; font-weight: 700; line-height: 1.35; letter-spacing: -0.2px; color: #111; }
    .card__title--lg { font-size: clamp(17px, 1.8vw, 22px); }
    .card__title--md { font-size: 14.5px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card__title--sm { font-size: 13.5px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card__summary { margin: 0; font-size: 13.5px; line-height: 1.65; color: rgba(0,0,0,0.52); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .card__summary--clamp2 { -webkit-line-clamp: 2; font-size: 12.5px; }
    .card__tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
    .card__meta { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: rgba(0,0,0,0.38); margin-top: auto; padding-top: 6px; }
    .card__source { font-weight: 600; color: rgba(0,0,0,0.55); }
    .card__dot    { opacity: 0.35; }
    .card__time, .card__read { color: rgba(0,0,0,0.38); }

    /* Headline variant */
    .card--headline .card__link { display: grid; grid-template-columns: 1fr 1fr; min-height: 260px; }
    .card--headline .card__img-wrap { min-height: 260px; border-radius: 11px 0 0 11px; }
    .card--headline .card__body { justify-content: center; padding: 24px 26px; gap: 10px; }
    .card--headline .card__summary { -webkit-line-clamp: 5; }
    /* Small variant */
    .card--small .card__link { display: flex; flex-direction: row; align-items: flex-start; gap: 12px; padding: 14px; flex: 1; }
    .card--small .card__body { padding: 0; gap: 4px; }
    /* Stacked variant */
    .card--stacked .card__link { display: flex; flex-direction: column; flex: 1; }
    .card--stacked .card__img-wrap { border-radius: 11px 11px 0 0; }
    .card--stacked .card__body { gap: 6px; }
    @media (max-width: 640px) {
      .card--headline .card__link { grid-template-columns: 1fr; }
      .card--headline .card__img-wrap { min-height: unset; aspect-ratio: 16 / 8; border-radius: 11px 11px 0 0; }
      .card--headline .card__summary { display: none; }
    }

    /* ── Actions bar ──────────────────────────────────────────────── */
    .card__actions {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 2px; padding: 5px 10px 8px;
      border-top: 1px solid rgba(0,0,0,0.05); flex-shrink: 0;
    }
    .card__action-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; padding: 0; border: none; background: none;
      border-radius: 6px; cursor: pointer; color: rgba(0,0,0,0.32);
      transition: background 0.14s ease, color 0.14s ease;
    }
    .card__action-btn:hover { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.65); }
    .card__action-btn--liked { color: #e5383b; }
    .card__action-btn--liked:hover { background: rgba(229,56,59,0.08); color: #c0272a; }
    .card__more-wrap { position: relative; }
    .card__more-menu {
      position: absolute; bottom: calc(100% + 6px); right: 0;
      list-style: none; margin: 0; padding: 5px;
      background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.06);
      min-width: 160px; z-index: 200;
    }
    .card__menu-item {
      display: flex; align-items: center; gap: 9px; width: 100%;
      padding: 8px 11px; background: none; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: #111; cursor: pointer;
      text-align: left; white-space: nowrap; transition: background 0.12s ease;
    }
    .card__menu-item:hover { background: rgba(0,0,0,0.05); }
    .card__menu-item--on { color: #4da6ff; }
    .card__menu-item--danger { color: rgba(0,0,0,0.55); }
    .card__menu-item--danger:hover { color: #e5383b; background: rgba(229,56,59,0.06); }
    .card__menu-item--danger.card__menu-item--on { color: #e5383b; }

    /* ── Skeleton ─────────────────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #ebebeb 25%, #f5f5f5 50%, #ebebeb 75%);
      background-size: 1200px 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 6px;
    }
    .skel-headline {
      border-radius: 12px; overflow: hidden; background: #fff;
      border: 1px solid rgba(0,0,0,0.07); display: grid;
      grid-template-columns: 1fr 1fr; min-height: 260px;
    }
    .skel-headline__image { border-radius: 0; height: 100%; min-height: 260px; }
    .skel-headline__body { padding: 24px 26px; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
    .skel-headline__src { height: 10px; width: 70px; }
    .skel-headline__title { height: 20px; width: 92%; }
    .skel-headline__title--lg { height: 22px; width: 80%; }
    .skel-headline__line { height: 13px; width: 100%; }
    .skel-headline__line--short { width: 65%; }
    .skel-headline__meta { height: 11px; width: 130px; margin-top: 6px; }
    .skel-smalls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .skel-double { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .skel-small { border-radius: 10px; overflow: hidden; background: #fff; border: 1px solid rgba(0,0,0,0.07); padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
    .skel-small--vertical { flex-direction: column; padding: 0; }
    .skel-small__image { flex-shrink: 0; width: 76px; height: 76px; border-radius: 8px; }
    .skel-small__image--full { width: 100%; height: auto; aspect-ratio: 16 / 8; border-radius: 0; }
    .skel-small__body { flex: 1; display: flex; flex-direction: column; gap: 7px; padding-bottom: 2px; }
    .skel-small__body--padded { padding: 14px 16px 16px; }
    .skel-small__src { height: 10px; width: 60px; }
    .skel-small__title { height: 13px; width: 90%; }
    .skel-small__title--short { width: 65%; }
    .skel-small__meta { height: 10px; width: 90px; margin-top: 4px; }
    @media (max-width: 768px) { .skel-smalls { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px) {
      .skel-smalls, .skel-double { grid-template-columns: 1fr; }
      .skel-headline { grid-template-columns: 1fr; }
      .skel-headline__image { min-height: 180px; }
    }

    /* ── Spinner ──────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 28px 0; }
    .spinner__ring { width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.08); border-top-color: rgba(0,0,0,0.45); border-radius: 50%; animation: spin 0.75s linear infinite; }
    .spinner__text { font-size: 12px; color: rgba(0,0,0,0.35); letter-spacing: 0.2px; }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: 300px; flex-shrink: 0; display: flex; flex-direction: column;
      gap: 12px; padding: 20px 0 80px; position: sticky; top: 52px;
      max-height: calc(100vh - 52px); overflow-y: auto; scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    @media (max-width: 900px) { .sidebar { display: none; } }

    /* ── InterestsWidget ──────────────────────────────────────────── */
    .interests { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 18px 18px 16px; position: relative; }
    .interests__close { position: absolute; top: 14px; right: 14px; background: none; border: none; font-size: 18px; color: rgba(0,0,0,0.35); cursor: pointer; line-height: 1; padding: 0 2px; transition: color 0.15s; }
    .interests__close:hover { color: rgba(0,0,0,0.7); }
    .interests__title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 5px; }
    .interests__desc { font-size: 12.5px; color: rgba(0,0,0,0.5); line-height: 1.5; margin-bottom: 14px; }
    .interests__chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .interests__chip { display: flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 22px; border: 1.5px solid rgba(0,0,0,0.13); background: #fff; font-size: 12.5px; font-weight: 500; color: #222; cursor: pointer; transition: border-color 0.15s, background 0.15s, color 0.15s; }
    .interests__chip:hover { border-color: rgba(0,0,0,0.28); }
    .interests__chip--on { border-color: #6c6cff; background: rgba(108,108,255,0.07); color: #6c6cff; }
    .interests__chip-icon { font-size: 13px; }
    .interests__save { width: 100%; padding: 11px; border-radius: 10px; border: none; background: #222; color: #fff; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
    .interests__save:hover:not(:disabled) { background: #000; }
    .interests__save:disabled { opacity: 0.4; cursor: not-allowed; }
    .interests__save--done { background: #1a8f5a; }
    .interests__save--done:hover { background: #157a4d !important; }

    /* ── WeatherWidget ────────────────────────────────────────────── */
    .weather { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 16px 18px 14px; }
    .weather__top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .weather__current { display: flex; align-items: center; gap: 6px; }
    .weather__icon { font-size: 18px; }
    .weather__temp { font-size: 17px; font-weight: 600; color: #111; }
    .weather__unit { font-size: 13px; font-weight: 400; color: rgba(0,0,0,0.4); }
    .weather__condition { font-size: 13px; color: rgba(0,0,0,0.45); }
    .weather__location-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .weather__location { font-size: 13px; color: rgba(0,0,0,0.55); }
    .weather__hl { font-size: 12px; color: rgba(0,0,0,0.4); }
    .weather__divider { height: 1px; background: rgba(0,0,0,0.07); margin-bottom: 12px; }
    .weather__forecast { display: flex; justify-content: space-between; }
    .weather__day { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .weather__day-icon { font-size: 18px; }
    .weather__day-temp { font-size: 12.5px; font-weight: 600; color: #111; }
    .weather__day-label { font-size: 11px; color: rgba(0,0,0,0.4); }

    /* ── MarketWidget ─────────────────────────────────────────────── */
    .market { background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 16px 18px 14px; }
    .market__section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .market__section-header--mt { margin-top: 18px; }
    .market__section-title { font-size: 13px; font-weight: 700; color: #111; }
    .market__chevron { font-size: 16px; color: rgba(0,0,0,0.35); cursor: pointer; }
    .market__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .market__card { background: #f7f7f7; border-radius: 10px; padding: 10px 12px 8px; overflow: hidden; }
    .market__card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; margin-bottom: 2px; }
    .market__card-name { font-size: 11px; color: rgba(0,0,0,0.5); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .market__card-pct { font-size: 10.5px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .market__card-price { font-size: 13px; font-weight: 700; color: #111; margin-bottom: 1px; }
    .market__card-change { font-size: 11px; font-weight: 500; margin-bottom: 8px; }
    .market__spark { width: 100%; height: 36px; display: block; }
    .market__up { color: #1a8f5a; }
    .market__down { color: #e5383b; }
    .market__trending { display: flex; flex-direction: column; gap: 0; }
    .market__row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .market__row:last-child { border-bottom: none; }
    .market__logo { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; letter-spacing: -0.5px; }
    .market__row-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }

  return Math.floor(diff / 86400) + 'd ago';
}

function feedSectionHtml(chunk) {
  let html = '<div class="feed__section">';
  if (chunk[0]) html += headlineCardHtml(chunk[0]);
  if (chunk[1]) {
    html += '<div class="feed__small-grid">';
    html += smallCardHtml(chunk[1]);
    if (chunk[2]) html += smallCardHtml(chunk[2]);
    if (chunk[3]) html += smallCardHtml(chunk[3]);
    html += '</div>';
  }
  if (chunk[4] && chunk[5]) {
    html += '<div class="feed__double-row">' + stackedCardHtml(chunk[4]) + stackedCardHtml(chunk[5]) + '</div>';
  } else if (chunk[4] && !chunk[5]) {
    html += '<div class="feed__small-grid">' + smallCardHtml(chunk[4]) + '</div>';
  }
  html += '</div>';
  return html;
}

function skeletonHtml() {
  const smallSkel = `
    <div class="skel-small">

        <div class="skeleton skel-small__meta"></div>
      </div>
      <div class="skeleton skel-small__image"></div>
    </div>`;
  const stackedSkel = `
    <div class="skel-small skel-small--vertical">
      <div class="skeleton skel-small__image skel-small__image--full"></div>
      <div class="skel-small__body skel-small__body--padded">
        <div class="skeleton skel-small__src"></div>
        <div class="skeleton skel-small__title"></div>
        <div class="skeleton skel-small__title skel-small__title--short"></div>
        <div class="skeleton skel-small__meta"></div>
      </div>
    </div>`;
  return `
    <div class="skel-headline">
      <div class="skeleton skel-headline__image"></div>
      <div class="skel-headline__body">
        <div class="skeleton skel-headline__src"></div>
        <div class="skeleton skel-headline__title skel-headline__title--lg"></div>
        <div class="skeleton skel-headline__title"></div>

        <div class="skeleton skel-headline__meta"></div>

    <div class="skel-smalls">${smallSkel}${smallSkel}${smallSkel}</div>
    <div class="skel-double">${stackedSkel}${stackedSkel}</div>`;
}

function spinnerHtml() {
  return `<div class="spinner"><div class="spinner__ring"></div><span class="spinner__text">Loading more…</span></div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Feed rendering ──────────────────────────────────────────────────────────

function renderFeed() {
  const feed = document.getElementById('feed');
  const articles = state.displayedArticles;

  if (state.loading && articles.length === 0) {
    feed.innerHTML = skeletonHtml();
    return;
  }

  if (articles.length === 0) {
    feed.innerHTML = '<div class="feed__state"><p>No articles found for this topic.</p></div>';
    return;
  }

  let html = '';
  for (let i = 0; i < articles.length; i += 6) {
    html += feedSectionHtml(articles.slice(i, i + 6));
  }

  html += '<div class="feed__sentinel" id="sentinel" aria-hidden="true"></div>';

  if (state.loading && articles.length > 0) {
    html += spinnerHtml();
  }

  if (!state.hasMore && !state.loading) {
    html += `<p class="feed__end" aria-live="polite">You've reached the end · ${articles.length} articles loaded</p>`;
  }

  feed.innerHTML = html;
  setupSentinelObserver();
}

function rerenderActionsBar(articleId) {
  const wrap = document.querySelector(`[data-more-wrap="${articleId}"]`);
  if (!wrap) return;
  const bar = wrap.closest('.card__actions');
  if (!bar) return;
  const a = getActions(articleId);

  // Update like button
  const likeBtn = bar.querySelector(`[data-action-like="${articleId}"]`);
  if (likeBtn) {
    likeBtn.className = 'card__action-btn' + (a.liked ? ' card__action-btn--liked' : '');
    likeBtn.setAttribute('aria-label', a.liked ? 'Unlike' : 'Like');
    likeBtn.innerHTML = heartIconSvg(a.liked);
  }

  // Update more button + dropdown
  const moreBtn = bar.querySelector(`[data-action-more="${articleId}"]`);
  if (moreBtn) {
    moreBtn.setAttribute('aria-expanded', state.openDropdownId === articleId ? 'true' : 'false');
  }

  const menuOpen = state.openDropdownId === articleId;
  let existingMenu = wrap.querySelector('.card__more-menu');
  if (menuOpen && !existingMenu) {
    wrap.insertAdjacentHTML('beforeend', `
      <ul class="card__more-menu" role="menu">
        <li role="none">
          <button class="card__menu-item${a.bookmarked ? ' card__menu-item--on' : ''}"
            role="menuitem" data-action-menu="bookmarked" data-id="${articleId}">
            ${bookmarkIconSvg} ${a.bookmarked ? 'Saved' : 'Bookmark'}
          </button>
        </li>
        <li role="none">
          <button class="card__menu-item${a.inSpace ? ' card__menu-item--on' : ''}"
            role="menuitem" data-action-menu="inSpace" data-id="${articleId}">
            ${plusIconSvg} ${a.inSpace ? 'In Space' : 'Add to Space'}
          </button>
        </li>
        <li role="none">
          <button class="card__menu-item card__menu-item--danger${a.disliked ? ' card__menu-item--on' : ''}"
            role="menuitem" data-action-menu="disliked" data-id="${articleId}">
            ${dislikeIconSvg} ${a.disliked ? 'Disliked' : 'Dislike'}
          </button>
        </li>
      </ul>`);
  } else if (!menuOpen && existingMenu) {
    existingMenu.remove();
  } else if (menuOpen && existingMenu) {
    // refresh menu item classes/labels
    const bm = existingMenu.querySelector('[data-action-menu="bookmarked"]');
    if (bm) { bm.className = 'card__menu-item' + (a.bookmarked ? ' card__menu-item--on' : ''); bm.innerHTML = bookmarkIconSvg + ' ' + (a.bookmarked ? 'Saved' : 'Bookmark'); }
    const sp = existingMenu.querySelector('[data-action-menu="inSpace"]');
    if (sp) { sp.className = 'card__menu-item' + (a.inSpace ? ' card__menu-item--on' : ''); sp.innerHTML = plusIconSvg + ' ' + (a.inSpace ? 'In Space' : 'Add to Space'); }
    const dl = existingMenu.querySelector('[data-action-menu="disliked"]');
    if (dl) { dl.className = 'card__menu-item card__menu-item--danger' + (a.disliked ? ' card__menu-item--on' : ''); dl.innerHTML = dislikeIconSvg + ' ' + (a.disliked ? 'Disliked' : 'Dislike'); }
  }
}

// ── Action handlers ─────────────────────────────────────────────────────────

function toggleAction(articleId, key) {
  const a = ensureActions(articleId);
  a[key] = !a[key];
  rerenderActionsBar(articleId);
}

// Single delegated click handler for all feed interactions
document.addEventListener('click', function(e) {
  // Like button
  const likeBtn = e.target.closest('[data-action-like]');
  if (likeBtn) {
    e.stopPropagation();
    toggleAction(Number(likeBtn.dataset.actionLike), 'liked');
    return;
  }

  // ··· button
  const moreBtn = e.target.closest('[data-action-more]');
  if (moreBtn) {
    e.stopPropagation();
    const id = Number(moreBtn.dataset.actionMore);
    state.openDropdownId = state.openDropdownId === id ? null : id;
    rerenderActionsBar(id);
    return;
  }

  // Menu item inside ··· dropdown
  const menuItem = e.target.closest('[data-action-menu]');
  if (menuItem) {
    e.stopPropagation();
    const id = Number(menuItem.dataset.id);
    const key = menuItem.dataset.actionMenu;
    toggleAction(id, key);
    state.openDropdownId = null;
    rerenderActionsBar(id);
    return;
  }

  // Close ··· dropdown when clicking outside
  if (state.openDropdownId !== null) {
    const openWrap = document.querySelector(`[data-more-wrap="${state.openDropdownId}"]`);
    if (!openWrap || !openWrap.contains(e.target)) {
      const prevId = state.openDropdownId;
      state.openDropdownId = null;
      rerenderActionsBar(prevId);
    }
  }

  // Close navbar dropdowns
  if (state.topicsOpen && !document.getElementById('topics-wrap').contains(e.target)) {
    closeTopicsDropdown();
  }
  if (state.shareOpen && !document.getElementById('share-wrap').contains(e.target)) {
    closeShareDropdown();
  }
});

// ── Pagination ──────────────────────────────────────────────────────────────

function loadPage(replace) {
  if (state.loading) return;
  const filtered = getFilteredArticles();
  const total = filtered.length;

  if (!replace && !state.hasMore) return;

  state.loading = true;
  if (replace) renderFeed(); // show skeleton on first load

  // Simulate 200–400 ms network delay for realism
  setTimeout(() => {
    const nextPage = replace ? 1 : state.currentPage + 1;
    const start = (nextPage - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const slice = filtered.slice(start, end);

    if (replace) {
      state.displayedArticles = slice;
    } else {
      state.displayedArticles = [...state.displayedArticles, ...slice];
    }

    state.currentPage = nextPage;
    state.hasMore = end < total;
    state.loading = false;
    renderFeed();
  }, 200 + Math.random() * 200);
}

function resetAndLoad() {
  state.displayedArticles = [];
  state.currentPage = 0;
  state.hasMore = true;
  loadPage(true);
}

// ── Infinite scroll ─────────────────────────────────────────────────────────

let scrollObserver = null;

function setupSentinelObserver() {
  if (scrollObserver) scrollObserver.disconnect();
  const sentinel = document.getElementById('sentinel');
  if (!sentinel) return;

  scrollObserver = new IntersectionObserver(
    ([entry]) => {
      if (entry.isIntersecting && !state.loading && state.hasMore) {
        loadPage(false);
      }
    },
    { rootMargin: '200px' }
  );
  scrollObserver.observe(sentinel);
}

// ── Navbar ──────────────────────────────────────────────────────────────────

function setActiveTab(tabId) {
  state.activeTab = tabId;
  document.getElementById('tab-foryou').className = 'navbar__tab' + (tabId === 'for-you' ? ' navbar__tab--active' : '');
  document.getElementById('tab-top').className    = 'navbar__tab' + (tabId === 'top'     ? ' navbar__tab--active' : '');
  document.getElementById('tab-topics').className = 'navbar__tab navbar__tab--topics' + (tabId === 'topics' ? ' navbar__tab--active' : '');
}

function handleTabForYou() {
  setActiveTab('for-you');
  closeTopicsDropdown();
  state.activeTopic = null;
  document.getElementById('topics-label').textContent = 'Topics';
  applyFilter(null);
}

function handleTabTop() {
  setActiveTab('top');
  closeTopicsDropdown();
  state.activeTopic = null;
  document.getElementById('topics-label').textContent = 'Topics';
  applyFilter(null);
}

function toggleTopicsDropdown() {
  state.topicsOpen ? closeTopicsDropdown() : openTopicsDropdown();
}

function openTopicsDropdown() {
  state.topicsOpen = true;
  const btn = document.getElementById('tab-topics');
  btn.setAttribute('aria-expanded', 'true');
  document.getElementById('topics-chevron').classList.add('navbar__chevron--open');
  const dd = document.getElementById('topics-dropdown');
  dd.innerHTML = TOPICS.map(t => `
    <button class="navbar__dropdown-item${state.activeTopic === t.label ? ' navbar__dropdown-item--active' : ''}"
      onclick="handleTopicClick('${t.label}')" role="option" aria-selected="${state.activeTopic === t.label}">
      <span class="navbar__dropdown-icon">${t.icon}</span>${t.label}
    </button>`).join('');
  dd.style.display = 'block';
}

function closeTopicsDropdown() {
  state.topicsOpen = false;
  document.getElementById('tab-topics').setAttribute('aria-expanded', 'false');
  document.getElementById('topics-chevron').classList.remove('navbar__chevron--open');
  document.getElementById('topics-dropdown').style.display = 'none';
}

function handleTopicClick(label) {
  setActiveTab('topics');
  closeTopicsDropdown();
  state.activeTopic = label;
  document.getElementById('topics-label').textContent = label;
  const topic = TOPICS.find(t => t.label === label);
  applyFilter(topic ? topic.categories : null);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleShareDropdown() {
  state.shareOpen ? closeShareDropdown() : openShareDropdown();
}

function openShareDropdown() {
  state.shareOpen = true;
  document.getElementById('share-wrap').querySelector('.navbar__share-btn').setAttribute('aria-expanded', 'true');
  document.getElementById('share-dropdown').style.display = 'block';
}

function closeShareDropdown() {
  state.shareOpen = false;
  document.getElementById('share-wrap').querySelector('.navbar__share-btn').setAttribute('aria-expanded', 'false');
  document.getElementById('share-dropdown').style.display = 'none';
}

function handleCopyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    document.getElementById('copy-label').textContent = 'Copied!';
    setTimeout(() => {
      document.getElementById('copy-label').textContent = 'Copy Link';
      closeShareDropdown();
    }, 1500);
  });
}

function handleFilterClick() {
  state.showInterests = true;
  renderInterestsWidget();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Filter logic ────────────────────────────────────────────────────────────

function applyFilter(categories) {
  // activeTopic wins; else fall back to saved categories
  if (categories !== undefined) {
    state.filterCategories = categories;
  } else {
    state.filterCategories = state.activeTopic
      ? TOPICS.find(t => t.label === state.activeTopic)?.categories || null
      : state.savedCategories;
  }
  resetAndLoad();
}

// ── Interests widget ────────────────────────────────────────────────────────

let selectedTopicIds = new Set();
let interestsSaved = false;

function renderInterestsWidget() {
  const container = document.getElementById('interests-container');
  if (!state.showInterests) { container.innerHTML = ''; return; }

  container.innerHTML = `
    <div class="interests">
      <button class="interests__close" onclick="closeInterests()" aria-label="Close">×</button>
      <h3 class="interests__title">Make it yours</h3>
      <p class="interests__desc">Select topics and interests to customize your Discover experience</p>
      <div class="interests__chips">
        ${TOPICS.map(t => `
          <button class="interests__chip${selectedTopicIds.has(t.id) ? ' interests__chip--on' : ''}"
            onclick="toggleTopic('${t.id}')">
            <span class="interests__chip-icon">${t.icon}</span>${t.label}
          </button>`).join('')}
      </div>
      <button class="interests__save${interestsSaved ? ' interests__save--done' : ''}"
        onclick="saveInterests()" ${selectedTopicIds.size === 0 ? 'disabled' : ''}>
        ${interestsSaved ? 'Saved ✓' : 'Save Interests'}
      </button>
    </div>`;
}

function toggleTopic(id) {
  if (selectedTopicIds.has(id)) selectedTopicIds.delete(id);
  else selectedTopicIds.add(id);
  interestsSaved = false;
  renderInterestsWidget();
}

function saveInterests() {
  const cats = [...new Set(
    TOPICS.filter(t => selectedTopicIds.has(t.id)).flatMap(t => t.categories)
  )];
  state.savedCategories = cats;
  state.savedTopicIds = new Set(selectedTopicIds);
  // Show filter icon in navbar
  document.getElementById('filter-wrap').style.display = 'flex';
  interestsSaved = true;
  renderInterestsWidget();
  setTimeout(closeInterests, 800);
  // Apply saved interests if no topic is actively selected
  if (!state.activeTopic) {
    state.filterCategories = cats;
    resetAndLoad();
  }
}

function closeInterests() {
  state.showInterests = false;
  renderInterestsWidget();
}

// ── Cookie banner ────────────────────────────────────────────────────────────

function initCookieBanner() {
  if (localStorage.getItem('cookie_consent')) return;
  setTimeout(() => {
    const banner = document.createElement('div');
    banner.className = 'cookie-banner';
    banner.setAttribute('role', 'dialog');
    banner.setAttribute('aria-modal', 'false');
    banner.setAttribute('aria-label', 'Cookie Policy');
    banner.innerHTML = `
      <div class="cookie-banner__card">
        <div class="cookie-banner__header">
          <span class="cookie-banner__icon" aria-hidden="true">🍪</span>
          <h2 class="cookie-banner__title">Cookie Policy</h2>
        </div>
        <p class="cookie-banner__body">
          We use cookies to enhance your experience. By clicking &ldquo;Accept All
          Cookies&rdquo; or selecting &ldquo;Necessary Cookies&rdquo;, you agree to our
          <a href="#" class="cookie-banner__link">privacy policy</a>.
        </p>
        <div class="cookie-banner__actions">
          <button class="cookie-banner__btn cookie-banner__btn--primary"
            onclick="acceptCookies('necessary', this)">Necessary Cookies</button>
          <button class="cookie-banner__btn cookie-banner__btn--secondary"
            onclick="acceptCookies('all', this)">Accept All Cookies</button>
        </div>
      </div>`;
    document.body.appendChild(banner);
  }, 600);
}

function acceptCookies(type, btn) {
  localStorage.setItem('cookie_consent', type);
  btn.closest('.cookie-banner').remove();
}

// ── Scroll-to-top ────────────────────────────────────────────────────────────

let scrollTopVisible = false;
let scrollTopBtn = null;

window.addEventListener('scroll', () => {
  const shouldShow = window.scrollY > 400;
  if (shouldShow && !scrollTopVisible) {
    scrollTopVisible = true;
    scrollTopBtn = document.createElement('button');
    scrollTopBtn.className = 'scroll-top';
    scrollTopBtn.innerHTML = '↑';
    scrollTopBtn.setAttribute('aria-label', 'Scroll to top');
    scrollTopBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    document.body.appendChild(scrollTopBtn);
  } else if (!shouldShow && scrollTopVisible) {
    scrollTopVisible = false;
    if (scrollTopBtn) { scrollTopBtn.remove(); scrollTopBtn = null; }
  }
}, { passive: true });

function sparklinePath(values, w, h) {
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const step = w / (values.length - 1);
  return values.map((v, i) => {
    const x = (i * step).toFixed(1);
    const y = (h - ((v - min) / range) * h).toFixed(1);
    return (i === 0 ? 'M' : 'L') + x + ',' + y;
  }).join(' ');
}
